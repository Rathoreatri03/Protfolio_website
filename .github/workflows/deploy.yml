name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - atri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Generate static index.html from built assets
        run: |
          BASE="/arcane-art-hub"

          # Find CSS and JS filenames from the build output
          CSS_FILE=$(ls dist/client/assets/*.css 2>/dev/null | head -1 | xargs -I{} basename {} || echo "")
          JS_FILE=$(ls dist/client/assets/index-*.js 2>/dev/null | head -1 | xargs -I{} basename {} || echo "")

          echo "CSS: $CSS_FILE"
          echo "JS:  $JS_FILE"

          # Build the <link> tag for CSS (optional)
          CSS_TAG=""
          if [ -n "$CSS_FILE" ]; then
            CSS_TAG="  <link rel=\"stylesheet\" crossorigin href=\"${BASE}/assets/${CSS_FILE}\" />"
          fi

          # Write the SPA shell index.html
          cat > dist/client/index.html << HTML
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Atri's Portfolio</title>
            <link rel="icon" href="${BASE}/favicon.ico?v=2" />
          ${CSS_TAG}
            <script type="module" crossorigin src="${BASE}/assets/${JS_FILE}"></script>
          </head>
          <body>
          </body>
          </html>
          HTML

          echo "Generated index.html ($(wc -c < dist/client/index.html) bytes)"

          # Copy as 404 fallback so all SPA routes work (e.g. /skills, /work)
          cp dist/client/index.html dist/client/404.html

          # Make sure the favicon is included
          cp public/favicon.ico dist/client/favicon.ico 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/client
          force_orphan: true

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - atri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Generate static index.html from built assets
        run: |
          # Copy the automatically built SPA shell (_shell.html) to index.html and 404.html
          cp dist/client/_shell.html dist/client/index.html
          cp dist/client/_shell.html dist/client/404.html
          echo "Copied _shell.html to index.html and 404.html successfully"

          # Make sure the favicon is included
          cp public/favicon.ico dist/client/favicon.ico 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/client
          force_orphan: true
